<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工作信息评分</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">工作信息评分系统</h1>
        
        <form id="workForm">
            <div class="form-group">
                <label for="name">姓名</label>
                <input type="text" id="name" placeholder="请输入您的姓名" required>
            </div>

            <div class="form-group">
                <label for="jobType">工作类型</label>
                <select id="jobType" required>
                    <option value="">请选择工作类型</option>
                    <option value="it">IT/互联网</option>
                    <option value="education">教育/培训</option>
                    <option value="medical">医疗/健康</option>
                    <option value="finance">金融/经济</option>
                    <option value="service">服务业</option>
                    <option value="other">其他</option>
                </select>
            </div>

            <div class="form-group">
                <label for="workYears">工作年限</label>
                <select id="workYears" required>
                    <option value="">请选择工作年限</option>
                    <option value="0-1">1年以下</option>
                    <option value="1-3">1-3年</option>
                    <option value="3-5">3-5年</option>
                    <option value="5-10">5-10年</option>
                    <option value="10+">10年以上</option>
                </select>
            </div>

            <div class="form-group">
                <label for="monthlyIncome">月收入(元)</label>
                <input type="number" id="monthlyIncome" min="0" step="1000" placeholder="请输入月收入" required>
            </div>

            <div class="form-group">
                <label for="workSatisfaction">工作满意度 (1-10分)</label>
                <input type="range" id="workSatisfaction" min="1" max="10" value="5">
                <span id="satisfactionValue">5分</span>
            </div>

            <div class="form-group">
                <label for="skills">专业技能 (可多选)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="skills" value="communication"> 沟通能力</label>
                    <label><input type="checkbox" name="skills" value="teamwork"> 团队协作</label>
                    <label><input type="checkbox" name="skills" value="leadership"> 领导能力</label>
                    <label><input type="checkbox" name="skills" value="technical"> 专业技术</label>
                    <label><input type="checkbox" name="skills" value="creative"> 创新能力</label>
                </div>
            </div>

            <button type="submit" class="submit-btn">获取评分报告</button>
        </form>

        <div id="result" class="result-card" style="display: none;">
            <h2>评分报告</h2>
            <div class="score-circle">
                <span id="score">0</span>
            </div>
            <div id="comment" class="comment"></div>
            <div id="suggestions" class="suggestions"></div>
            <button class="reset-btn" onclick="resetForm()">重新填写</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
